; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



; ------------------------ATmega328P------------------------


; -------------------------------------------------------------------ATmega328_Base---------------------------------------------------------------
[env:atmega328_base]
platform = atmelavr
board = ATmega328P
framework = arduino
; upload_port = COM24
upload_speed = 115200
monitor_speed = 115200


; Rutas relativas al proyecto (evita rutas tipo C:/Users/.../Arduino/libraries).
lib_extra_dirs =
    ${PROJECT_DIR}/lib

build_flags =
    -D F_CPU=16000000L
    -D ARDUINO_AVR_ATmega328P
    -D ARDUINO_ARCH_AVR
    -I include
    
    ; Optimización IRremote: Solo NEC (ahorra ~3-5KB)
    ; Solo definimos DECODE_NEC, los demás protocolos no se incluirán automáticamente
    -D DECODE_NEC
    -Os                    ; Optimización de tamaño (más importante que velocidad)
    -ffunction-sections    ; Permite eliminar funciones no usadas
    -fdata-sections        ; Permite eliminar datos no usados
    -Wl,--gc-sections      ; Elimina secciones no usadas del linker
    -fno-exceptions        ; Deshabilita excepciones C++ (ahorra RAM/Flash)
    -fno-rtti              ; Deshabilita RTTI (ahorra Flash)
    ; Include paths for new level structure

lib_deps =
    bblanchon/ArduinoJson@^6.21.3
    FastLED
    IRremote
    MPU6050
    Servo
    Wire

monitor_filters = 
    time
    default

; ------------------------Env:ATmega328_Car------------------------
[env:atmega328_car]
extends = env:atmega328_base
build_src_filter =
    +<main/*>

; Misma firmware que atmega328_car, con -D DEBUG (p. ej. echo del JSON en readJsonBySerial).
; Uso: pio run -e atmega328_car_debug
[env:atmega328_car_debug]
extends = env:atmega328_car
build_flags =
    ${env:atmega328_base.build_flags}
    -D DEBUG

; ------------------------Env:ATmega328_Test------------------------
[env:atmega328_test]
extends = env:atmega328_base
build_src_filter = 
    +<test/*>
; build_src_filter = +<../src/test_atmega/serial/serial_timeout/*>
;build_src_filter = +<../src/test_esp32/serial/serial_json/*>
;build_src_filter = +<../src/test_esp32/serial/serial_timeout/*>
build_flags =
    ${env:atmega328_base.build_flags}
    ; Debug flags: comenta estas líneas para desactivar el debug
    -D DEBUG_COMMAND_RECEIVER
    -D DEBUG_COMMANDS



[platformio]
; Descomenta la línea del entorno que quieras usar por defecto:
default_envs = atmega328_car
; default_envs = atmega328_test
