; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



; ------------------------ATmega328P------------------------


; -------------------------------------------------------------------ATmega328_Base---------------------------------------------------------------
[env:atmega328_base]
platform = atmelavr
board = ATmega328P
framework = arduino
; upload_port = COM24
upload_speed = 115200
monitor_speed = 9600


lib_extra_dirs =
    ${PROJECT_DIR}/lib
    C:/Users/34697/Documents/Arduino/libraries

build_flags =
    -D F_CPU=16000000L
    -D ARDUINO_AVR_ATmega328P
    -D ARDUINO_ARCH_AVR
    ; Include paths for new level structure

monitor_filters = 
    time
    default

; ------------------------Env:ATmega328_Car------------------------
[env:atmega328_car]
extends = env:atmega328_base
build_src_filter = +<../src/atmega/v1/*>
lib_deps =
    Servo
    Wire
    MPU6050
    IRremote    

; ------------------------Env:ATmega328_Test------------------------
[env:atmega328_test]
extends = env:atmega328_base
build_src_filter = +<../src/test_atmega/serial/serial_json/*>
; build_src_filter = +<../src/test_atmega/serial/serial_timeout/*>
;build_src_filter = +<../src/test_esp32/serial/serial_json/*>
;build_src_filter = +<../src/test_esp32/serial/serial_timeout/*>
lib_deps =
    ArduinoJson


